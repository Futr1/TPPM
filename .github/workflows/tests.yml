name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "./Mini-Agent-5-1[dev]"
          pip install pyyaml

      - name: Run core TPPM tests
        run: |
          cd Mini-Agent-5-1
          python -m pytest tests/test_tpm_memory.py tests/test_paper_configuration.py -q

      - name: Run offline unit tests (no external services)
        run: |
          cd Mini-Agent-5-1
          python -m pytest -m "not integration and not external_service" -q --ignore=tests/test_acp.py
